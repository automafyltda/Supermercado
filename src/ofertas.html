<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperMercado - Ofertas</title>
    <link rel="stylesheet" href="../assets/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="header-placeholder"></div>

    <main>
        <section class="offers-section">
            <h1>Ofertas Especiais</h1>
            <div class="products-grid" id="offers-grid"></div>
        </section>
    </main>

    <div class="footer-placeholder"></div>

    <script src="../js/main.js"></script>
    <script src="../js/products.js"></script>
    <script src="../js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const offersGrid = document.getElementById('offers-grid');
            if (offersGrid) {
                const offerProducts = Products.getOffers();
                
                if (offerProducts.length > 0) {
                    offerProducts.forEach(product => {
                        offersGrid.appendChild(Components.productCard(product));
                    });
                } else {
                    offersGrid.appendChild(
                        Components.emptyState(
                            'fa-tag',
                            SuperMercado.uiText.noOffers,
                            SuperMercado.uiText.noOffersMessage,
                            SuperMercado.uiText.seeProducts,
                            'index.html'
                        )
                    );
                }
            }
        });
    </script>
</body>
</html>
